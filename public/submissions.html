<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submissions — Metfraa EHS</title>
  <link rel="icon" type="image/png" href="/img/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/submissions.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <a href="/" style="display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;">
        <img src="/img/logo.png?v=2" alt="Metfraa" class="app-header__logo">
        <div>
          <h1 class="app-header__title">EHS Portal</h1>
          <div class="app-header__sub">Environment · Health · Safety</div>
        </div>
      </a>
      <div class="app-header__spacer"></div>
      <div id="user-pill"></div>
      <a href="/" class="app-header__btn">All Forms</a>
      <a href="/auth/logout" class="app-header__btn">Logout</a>
    </div>
  </header>

  <main class="container">
    <div class="page-head">
      <div>
        <h2 class="page-title" id="page-title">My Submissions</h2>
        <p class="page-subtitle" id="page-subtitle">Loading…</p>
      </div>
      <button id="refresh-btn" class="btn-secondary" type="button">↻ Refresh</button>
    </div>

    <div class="filter-bar" id="filter-bar">
      <div class="filter-field">
        <label>Form type</label>
        <select id="filter-form">
          <option value="">All forms</option>
        </select>
      </div>
      <div class="filter-field">
        <label>From date</label>
        <input type="date" id="filter-start">
      </div>
      <div class="filter-field">
        <label>To date</label>
        <input type="date" id="filter-end">
      </div>
      <div class="filter-field" id="filter-submitter-wrap" style="display:none;">
        <label>Submitted by</label>
        <select id="filter-submitter">
          <option value="">All users</option>
        </select>
      </div>
      <button id="apply-filters" class="btn-submit btn-submit--small" type="button">Apply</button>
      <button id="clear-filters" class="btn-secondary" type="button">Clear</button>
    </div>

    <div id="submissions-list">
      <div class="loading">Loading submissions…</div>
    </div>
  </main>

  <!-- PDF preview modal -->
  <div class="pdf-modal" id="pdf-modal" style="display:none;">
    <div class="pdf-modal__overlay" id="pdf-modal-close"></div>
    <div class="pdf-modal__panel">
      <div class="pdf-modal__header">
        <div>
          <div class="pdf-modal__code" id="pdf-modal-code"></div>
          <div class="pdf-modal__title" id="pdf-modal-title"></div>
          <div class="pdf-modal__meta" id="pdf-modal-meta"></div>
        </div>
        <div class="pdf-modal__actions">
          <a id="pdf-download" class="btn-photo" download>⬇ Download</a>
          <button class="btn-secondary" id="pdf-close-btn" type="button">Close ✕</button>
        </div>
      </div>
      <iframe id="pdf-iframe" title="PDF Preview"></iframe>
    </div>
  </div>

  <script src="/js/submissions.js"></script>
</body>
</html>
