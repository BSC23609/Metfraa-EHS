<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form — Metfraa EHS</title>
  <link rel="icon" type="image/png" href="/img/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <img src="/img/logo.png" alt="Metfraa" class="app-header__logo">
      <div>
        <h1 class="app-header__title">EHS Portal</h1>
        <div class="app-header__sub">Environment · Health · Safety</div>
      </div>
      <div class="app-header__spacer"></div>
      <div id="user-pill"></div>
      <a href="/" class="app-header__btn">All Forms</a>
      <a href="/auth/logout" class="app-header__btn">Logout</a>
    </div>
  </header>

  <main class="container">
    <a href="/" class="form-back">← Back to all forms</a>
    <div id="form-mount"></div>
  </main>

  <div class="loader" id="loader">
    <div class="loader__spinner"></div>
    <div class="loader__text" id="loader-text">Submitting…</div>
  </div>

  <script src="/js/form.js"></script>
</body>
</html>
