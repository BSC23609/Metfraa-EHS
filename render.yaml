# Render deployment blueprint
# Push this file to your repo. Then in Render, choose "New +" -> "Blueprint"
# and point it at your GitHub repo. Render will auto-create the service.
services:
  - type: web
    name: metfraa-ehs
    runtime: node
    plan: starter # change to 'free' if needed; starter is $7/mo and stays warm
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true # Render will create a random value on first deploy
      # Set these manually in the Render dashboard (Settings -> Environment):
      - key: APP_BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false
      - key: ONEDRIVE_USER_ID
        sync: false
      - key: ONEDRIVE_ROOT_FOLDER
        value: Metfraa-EHS
      - key: ADMIN_EMAILS
        sync: false
